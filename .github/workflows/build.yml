
name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:  # Actions 탭에서 수동 실행 가능

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 플랫폼 폴더 생성 (저장소에는 lib만 있음)
        run: flutter create --platforms=windows .

      - name: 의존성 설치
        run: flutter pub get

      - name: 정적 분석 (컴파일 에러를 여기서 잡는다)
        run: flutter analyze

      - name: Windows 릴리즈 빌드
        run: flutter build windows --release

      - name: VC++ 런타임 DLL 동봉 (재배포 패키지 미설치 PC 대응)
        run: |
          Copy-Item "C:\Windows\System32\msvcp140.dll" build\windows\x64\runner\Release\
          Copy-Item "C:\Windows\System32\vcruntime140.dll" build\windows\x64\runner\Release\
          Copy-Item "C:\Windows\System32\vcruntime140_1.dll" build\windows\x64\runner\Release\

      - name: 실행 파일 업로드
        uses: actions/upload-artifact@v5
        with:
          name: focus-one-windows
          path: build/windows/x64/runner/Release/
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Linux 시스템 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build libgtk-3-dev \
            libayatana-appindicator3-dev \
            libkeybinder-3.0-dev \
            libnotify-dev

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 플랫폼 폴더 생성
        run: flutter create --platforms=linux .

      - name: 의존성 설치
        run: flutter pub get

      - name: Linux 릴리즈 빌드
        run: flutter build linux --release

      - name: .deb 설치 패키지 생성 (더블클릭 설치용, 의존성 자동 설치)
        run: |
          mkdir -p deb/DEBIAN deb/opt/focus-one deb/usr/share/applications
          cp -r build/linux/x64/release/bundle/* deb/opt/focus-one/
          cat > deb/DEBIAN/control << 'EOF'
          Package: focus-one
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0t64 | libgtk-3-0, libayatana-appindicator3-1, libkeybinder-3.0-0, libnotify4 | libnotify4t64
          Maintainer: mingwonkim <noreply@github.com>
          Description: ADHD focus mini widget - one task at a time
           Single-task always-on-top focus widget for ADHD users.
          EOF
          cat > deb/usr/share/applications/focus-one.desktop << 'EOF'
          [Desktop Entry]
          Name=FocusOne
          Comment=One task at a time
          Exec=/opt/focus-one/focus_one
          Terminal=false
          Type=Application
          Categories=Utility;
          EOF
          dpkg-deb --build --root-owner-group deb focus-one_0.1.0_amd64.deb

      - name: 실행 파일 업로드 (zip)
        uses: actions/upload-artifact@v5
        with:
          name: focus-one-linux
          path: build/linux/x64/release/bundle/
          retention-days: 14

      - name: 설치 파일 업로드 (.deb)
        uses: actions/upload-artifact@v5
        with:
          name: focus-one-linux-deb
          path: focus-one_0.1.0_amd64.deb
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 플랫폼 폴더 생성
        run: flutter create --platforms=macos .

      - name: 의존성 설치
        run: flutter pub get

      - name: macOS 릴리즈 빌드 (서명 없음 — 개인 테스트용)
        run: flutter build macos --release

      - name: 앱 번들 압축 (zip으로 묶어야 실행 권한이 보존됨)
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent focus_one.app focus-one-macos.zip

      - name: 앱 번들 업로드
        uses: actions/upload-artifact@v5
        with:
          name: focus-one-macos
          path: build/macos/Build/Products/Release/focus-one-macos.zip
          retention-days: 14
